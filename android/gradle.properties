# Optimized memory settings for Gradle on low-memory systems (prevents OOM crashes)
org.gradle.jvmargs=-Xmx1536M -XX:+UseParallelGC -Dfile.encoding=UTF-8
org.gradle.workers.max=2
org.gradle.daemon.idletimeout=15000
kotlin.daemon.jvmargs=-Xmx512M
android.useAndroidX=true
android.enableJetifier=true
org.gradle.caching=true
org.gradle.parallel=true

# Java/JVM Configuration - Use JDK 17 or higher
# Remove hardcoded path to allow Gradle to auto-detect JDK 17+
# Ensure JAVA_HOME environment variable points to JDK 17 or higher
org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.auto-download=true

# Kotlin configuration
kotlin.code.style=official

# Enable detailed deprecation warnings and suppress obsolete options warnings
android.enableR8.fullMode=true
android.suppressUnsupportedCompileSdk=34

# AndroidX and Jetifier
android.nonTransitiveRClass=true
android.nonFinalResIds=true
