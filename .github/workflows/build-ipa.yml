name: Build & Sign iOS IPA

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Java 17
        # v5.2.0
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        # v2.18.0
        uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Install Apple Certificate & Provisioning Profile (Signed Build only)
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "No iOS signing secrets found. Proceeding with unsigned build..."
            echo "SIGNED_BUILD=false" >> $GITHUB_ENV
            exit 0
          fi
          echo "SIGNED_BUILD=true" >> $GITHUB_ENV
          
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode --output $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # uuid extraction
          UUID=$(security cms -D -i $PP_PATH | grep -A1 UUID | grep string | sed -E 's/<\/?string>//g' | xargs)
          echo "Provisioning Profile UUID: $UUID"

          # copy provisioning profile to proper system directory
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Build iOS Application
        run: |
          if [ "$SIGNED_BUILD" = "true" ]; then
            echo "Building signed iOS App/IPA..."
            flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
          else
            echo "Building unsigned iOS App..."
            flutter build ios --release --no-codesign
            
            # Package into an IPA manually
            echo "Packaging unsigned .app into .ipa..."
            mkdir -p build/ios/ipa
            mkdir -p Payload
            cp -R build/ios/Release-iphoneos/Runner.app Payload/
            zip -r build/ios/ipa/smartexpense.ipa Payload
            rm -rf Payload
            echo "Unsigned IPA generated successfully!"
          fi

      - name: Upload iOS IPA Artifact
        # v4.6.0
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: smartexpense-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Create or Update GitHub Release
        if: github.event_name != 'pull_request'
        # v2.0.8
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Release Build' }}
          body: |
            Automated release build of SmartExpense (iOS & Android).
            
            Triggered by commit: ${{ github.sha }} on branch/tag ${{ github.ref_name }}.
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          files: |
            build/ios/ipa/*.ipa
