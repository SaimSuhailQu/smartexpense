name: Build & Sign Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@3a472834ac7a402f617a50f82d0a8d446f9390c1 # v4.6.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@f2c4f66a36c25248c1e1d39281e4b9e28328dc5a # v2.18.0
        with:
          channel: 'stable'
          cache: true

      - name: Prepare Signing Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Restoring production keystore from repository secrets..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/smartexpense.jks
          else
            echo "No production keystore secret found. Generating a local dummy keystore for testing..."
            keytool -genkey -v \
              -keystore android/app/smartexpense.jks \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias smartexpense \
              -storepass Prex1211 \
              -keypass Prex1211 \
              -dname "CN=SmartExpense, OU=Dev, O=SmartExpense, L=City, S=State, C=US"
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Verify Flutter & Android Setup
        run: flutter doctor -v

      - name: Build Universal Release APK
        run: flutter build apk --release

      - name: Build Split-per-ABI Release APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload Universal APK Artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: smartexpense-universal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Split-per-ABI APK Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: smartexpense-split-apks
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: warn
          retention-days: 7
