name: Build & Sign Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Java 17
        # v5.2.0
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        # v2.18.0
        uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff
        with:
          channel: 'stable'
          cache: true

      - name: Prepare Signing Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Restoring production keystore from repository secrets..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/smartexpense.jks
          else
            echo "No production keystore secret found. Generating a local dummy keystore for testing..."
            keytool -genkey -v \
              -keystore android/app/smartexpense.jks \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias smartexpense \
              -storepass Prex1211 \
              -keypass Prex1211 \
              -dname "CN=SmartExpense, OU=Dev, O=SmartExpense, L=City, S=State, C=US"
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Verify Flutter & Android Setup
        run: flutter doctor -v

      - name: Accept Android Licenses
        run: |
          sudo mkdir -p "${ANDROID_HOME}/licenses"
          sudo chmod 777 "${ANDROID_HOME}/licenses"
          yes | flutter doctor --android-licenses

      - name: Build Universal Release APK
        run: flutter build apk --release

      - name: Build Split-per-ABI Release APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload Universal APK Artifact
        # v4.6.0
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: smartexpense-universal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Split-per-ABI APK Artifacts
        # v4.6.0
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: smartexpense-split-apks
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: warn
          retention-days: 7
