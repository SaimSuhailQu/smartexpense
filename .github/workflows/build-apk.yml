name: Build & Sign Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Java 17
        # v5.2.0
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        # v2.18.0
        uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff
        with:
          channel: 'stable'
          cache: true

      - name: Prepare Signing Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Restoring production keystore from repository secrets..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/smartexpense.jks
          else
            echo "No production keystore secret found. Generating a local dummy keystore for testing..."
            keytool -genkey -v \
              -keystore android/app/smartexpense.jks \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias smartexpense \
              -storepass Prex1211 \
              -keypass Prex1211 \
              -dname "CN=SmartExpense, OU=Dev, O=SmartExpense, L=City, S=State, C=US"
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Verify Flutter & Android Setup
        run: flutter doctor -v

      - name: Accept Android Licenses
        run: |
          sudo mkdir -p "${ANDROID_HOME}/licenses"
          sudo chmod 777 "${ANDROID_HOME}/licenses"
          yes | flutter doctor --android-licenses

      - name: Build Universal Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Install jq for JSON parsing
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run Firebase Test Lab Robo Test
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "Skipping Firebase Test Lab because GCP_SA_KEY is empty."
            exit 0
          fi
          echo "$GCP_SA_KEY" > gcp_key.json
          gcloud auth activate-service-account --key-file=gcp_key.json
          gcloud config set project $(jq -r .project_id gcp_key.json)
          gcloud firebase test android run \
            --type robo \
            --app build/app/outputs/flutter-apk/app-release.apk \
            --robo-script .github/workflows/robo_script.json \
            --timeout 3m
          rm -f gcp_key.json

      - name: Build Split-per-ABI Release APKs
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Upload Universal APK Artifact
        # v4.6.0
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: smartexpense-universal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Split-per-ABI APK Artifacts
        # v4.6.0
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: smartexpense-split-apks
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Create or Update GitHub Release
        if: github.event_name != 'pull_request'
        # v2.0.8
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Release Build' }}
          body: |
            Automated release build of SmartExpense.
            
            Triggered by commit: ${{ github.sha }} on branch/tag ${{ github.ref_name }}.
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
